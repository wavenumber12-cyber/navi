<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여기로 Go Go ~</title>
    <!-- 스마트폰 홈 화면 아이콘 설정 -->
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=180&h=180&fit=crop">
    <link rel="icon" href="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=180&h=180&fit=crop">
    <!-- 카카오 SDK 로드 -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6fa; padding: 10px; display: flex; justify-content: center; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 430px; text-align: center; box-sizing: border-box; }
        h2 { color: #2f3640; margin: 10px 0 5px 0; font-size: 20px; }
        p { color: #7f8c8d; font-size: 13px; margin-bottom: 15px; }
        
        /* 지도 영역 스타일 */
        #map { width: 100%; height: 300px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        
        .info-box { background-color: #f8f9fa; padding: 12px; border-radius: 8px; text-align: left; margin-bottom: 15px; border: 1px solid #e9ecef; }
        .info-title { font-weight: bold; color: #495057; font-size: 14px; margin-bottom: 5px; }
        .info-desc { color: #868e96; font-size: 12px; word-break: break-all; }
        
        /* 버튼 그룹 배치 */
        .share-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .btn-share { width: 100%; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-kakao-dest { background-color: #fee500; color: #191919; }
        .btn-my-loc { background-color: #3498db; color: white; }
        
        .navi-group { display: flex; gap: 8px; justify-content: space-between; }
        .btn-navi { flex: 1; border: none; padding: 12px 0; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; text-align: center; text-decoration: none; }
        .kakao-btn { background-color: #ffcd00; color: #3c1e1e; }
        .tmap-btn { background-color: #ff5000; }
        .naver-btn { background-color: #03c75a; }
        
        /* 커스텀 오버레이 스타일 */
        .custom-label {
            position: relative;
            bottom: 43px; 
            border-radius: 6px;
            border: 1px solid #ccc;
            border-bottom: 2px solid #ddd;
            background-color: #fff;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0px 1px 3px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 여기로 Go Go ~</h2>
    <p>지도를 터치하여 목적지를 지정하고 공유해 보세요.</p>

    <!-- 카카오 지도가 그려지는 영역 -->
    <div id="map"></div>

    <!-- 선택된 위치 정보 표시 구역 -->
    <div class="info-box">
        <div class="info-title">선택된 목적지</div>
        <div class="info-desc" id="targetAddr">지도를 터치하여 목적지를 지정해 주세요.</div>
        <div style="font-size: 11px; color: #adb5bd; margin-top: 5px;" id="targetCoords"></div>
    </div>

    <!-- 공유 버튼 그룹 -->
    <div class="share-group">
        <button class="btn-share btn-kakao-dest" onclick="shareKakao()">💬 목적지 단체방에 공유하기</button>
        <button class="btn-share btn-my-loc" onclick="setMyPositionAsDestination()">🔵 내 위치 공유하기 (목적지로 설정)</button>
    </div>

    <hr style="border: 0; height: 1px; background: #eee; margin: 15px 0;">

    <h3 style="font-size: 13px; color:#7f8c8d; text-align:left; margin-bottom:10px;">받은 사람이 누르는 내비 실행</h3>
    <div class="navi-group">
        <button class="btn-navi kakao-btn" onclick="openNavi('kakao')">카카오내비</button>
        <button class="btn-navi tmap-btn" onclick="openNavi('tmap')">티맵</button>
        <button class="btn-navi naver-btn" onclick="openNavi('naver')">네이버</button>
    </div>
</div>

<script>
    // 카카오 JavaScript SDK 초기화
    Kakao.init('e362e2f6732ecf112d8751219e8d3d61'); 

    // 기본 위치 변수 설정
    let selectedLat = 37.566826; 
    let selectedLng = 126.978656;
    let selectedName = "지정된 목적지";
    
    // 내 실제 현재 위치 보관용 변수
    let myCurrentLat = null;
    let myCurrentLng = null;

    let map;
    let destMarker; 
    let destOverlay; 
    let myLocationMarker; 
    let myLocationOverlay; 
    let geocoder;

    // 카카오 지도를 실제로 그리는 함수
    function drawMap() {
        const mapContainer = document.getElementById('map');
        
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const lat = urlParams.get('lat');
        const lng = urlParams.get('lng');

        if (name && lat && lng) {
            selectedName = decodeURIComponent(name);
            selectedLat = parseFloat(lat);
            selectedLng = parseFloat(lng);
        }

        const mapOption = {
            center: new kakao.maps.LatLng(selectedLat, selectedLng),
            level: 4
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        geocoder = new kakao.maps.services.Geocoder();

        // 1. [목적지 마커 세팅]
        destMarker = new kakao.maps.Marker({
            position: map.getCenter(),
            map: map
        });

        destOverlay = new kakao.maps.CustomOverlay({
            position: map.getCenter(),
            content: '<div class="custom-label">목적지</div>',
            yAnchor: 1 
        });
        destOverlay.setMap(map);

        if (name && lat && lng) {
            document.getElementById('targetAddr').innerText = selectedName;
            document.getElementById('targetCoords').innerText = `위도: ${selectedLat.toFixed(5)} / 경도: ${selectedLng.toFixed(5)}`;
        } else {
            geocoder.coord2Address(map.getCenter().getLng(), map.getCenter().getLat(), function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    selectedName = result[0].address.address_name;
                    document.getElementById('targetAddr').innerText = selectedName;
                }
            });
        }

        // 2. [내 위치 마커 세팅]
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                myCurrentLat = position.coords.latitude;
                myCurrentLng = position.coords.longitude;
                const currentPos = new kakao.maps.LatLng(myCurrentLat, myCurrentLng);

                const myImgSrc = 'https://t1.daumcdn.net/localimg/localimages/07/2018/pc/img/marker_spot.png'; 
                const myImgSize = new kakao.maps.Size(24, 35); 
                const myMarkerImage = new kakao.maps.MarkerImage(myImgSrc, myImgSize);

                myLocationMarker = new kakao.maps.Marker({
                    position: currentPos,
                    image: myMarkerImage,
                    map: map
                });

                myLocationOverlay = new kakao.maps.CustomOverlay({
                    position: currentPos,
                    content: '<div class="custom-label">내위치</div>',
                    yAnchor: 1
                });
                myLocationOverlay.setMap(map);

                if (!name && !lat && !lng) {
                    map.setCenter(currentPos);
                    destMarker.setPosition(currentPos);
                    destOverlay.setPosition(currentPos);
                    
                    selectedLat = myCurrentLat;
                    selectedLng = myCurrentLng;

                    geocoder.coord2Address(myCurrentLng, myCurrentLat, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            selectedName = result[0].address.address_name;
                            document.getElementById('targetAddr').innerText = selectedName;
                            document.getElementById('targetCoords').innerText = `위도: ${myCurrentLat.toFixed(5)} / 경도: ${myCurrentLng.toFixed(5)}`;
                        }
                    });
                }
            }, function(error) {
                console.log("위치 정보를 가져오는 데 실패했습니다.", error);
            });
        }

        // 지도 클릭 시 목적지 이동 이벤트
        kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
            const latlng = mouseEvent.latLng;
            destMarker.setPosition(latlng);
            destOverlay.setPosition(latlng); 

            selectedLat = latlng.getLat();
            selectedLng = latlng.getLng();

            geocoder.coord2Address(latlng.getLng(), latlng.getLat(), function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    selectedName = result[0].address.address_name;
                    document.getElementById('targetAddr').innerText = selectedName;
                    document.getElementById('targetCoords').innerText = `위도: ${selectedLat.toFixed(5)} / 경도: ${selectedLng.toFixed(5)}`;
                }
            });
        });

        setTimeout(function() {
            if (map) {
                map.relayout();
                map.setCenter(new kakao.maps.LatLng(selectedLat, selectedLng));
            }
        }, 100);
    }

    // [내 위치 공유하기]
    function setMyPositionAsDestination() {
        if (!myCurrentLat || !myCurrentLng) {
            alert("아직 현재 위치 정보를 불러오지 못했습니다.");
            return;
        }

        const myPos = new kakao.maps.LatLng(myCurrentLat, myCurrentLng);
        map.setCenter(myPos);
        destMarker.setPosition(myPos);
        destOverlay.setPosition(myPos);

        selectedLat = myCurrentLat;
        selectedLng = myCurrentLng;

        geocoder.coord2Address(myCurrentLng, myCurrentLat, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                selectedName = result[0].address.address_name;
                document.getElementById('targetAddr').innerText = selectedName;
                document.getElementById('targetCoords').innerText = `위도: ${selectedLat.toFixed(5)} / 경도: ${selectedLng.toFixed(5)}`;
                alert("내 현재 위치가 목적지로 지정되었습니다!");
            }
        });
    }

    function loadKakaoMapScript() {
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=e362e2f6732ecf112d8751219e8d3d61&libraries=services&autoload=false';
        script.onload = function() {
            kakao.maps.load(function() {
                drawMap();
            });
        };
        document.head.appendChild(script);
    }

    // [공유하기]
    function shareKakao() {
        if (!selectedName || !selectedLat || !selectedLng) {
            alert("목적지를 먼저 지정해 주세요!");
            return;
        }

        const shareUrl = `https://wavenumber12-cyber.github.io/navi/?name=${encodeURIComponent(selectedName)}&lat=${selectedLat}&lng=${selectedLng}`;

        Kakao.Share.sendDefault({
            objectType: 'feed',
            content: {
                title: '📍 여기로 Go Go ~',
                description: `목적지: ${selectedName}\n위 링크를 눌러 원하시는 내비를 골라 이동하세요!`,
                imageUrl: 'https://images.unsplash.com/photo-1524661135-423995f22d0b?w=500',
                link: { mobileWebUrl: shareUrl, webUrl: shareUrl },
            },
            buttons: [{
                title: '목적지 확인 및 내비 실행',
                link: { mobileWebUrl: shareUrl, webUrl: shareUrl },
            }],
        });
    }

    // 내비 앱 연결
    function openNavi(type) {
        if (type === 'kakao') {
            try {
                Kakao.Navi.start({
                    name: selectedName,
                    x: parseFloat(selectedLng),
                    y: parseFloat(selectedLat),
                    coordType: 'wgs84',
                });
            } catch (err) {
                alert('카카오내비 실행에 실패했습니다.');
            }
            return;
        } 
        
        let url = '';
        if (type === 'tmap') {
            // 💡 정밀 보완: 검색명(name) 뒤에 위도(lat)와 경도(lon) 좌표 데이터를 쌍으로 묶어서 전송합니다.
            // 이렇게 좌표 구조가 명확히 결합되어야 티맵 검색창 상단에 주소가 누락 없이 매핑됩니다.
            const isAndroid = /Android/i.test(navigator.userAgent);
            
            if (isAndroid) {
                url = `intent://tmap/search?name=${encodeURIComponent(selectedName)}&lat=${selectedLat}&lon=${selectedLng}#Intent;scheme=tmap;package=com.skt.tmap.ku;end`;
            } else {
                url = `tmap://search?name=${encodeURIComponent(selectedName)}&lat=${selectedLat}&lon=${selectedLng}`;
            }
        } else if (type === 'naver') {
            url = `nmap://navigation?dname=${encodeURIComponent(selectedName)}&dlat=${selectedLat}&dlng=${selectedLng}`;
        }

        window.location.href = url;
    }

    window.onload = function() {
        loadKakaoMapScript();
    };
</script>

</body>
</html>
